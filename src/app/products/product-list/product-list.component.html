<h2>Lista produktów</h2>
<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Nazwa</th>
      <th>Opis</th>
      <th>Cena</th>
      <th>Data dodania</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let p of products">
      <td>{{ p.id }}</td>
      <td>{{ p.name }}</td>
      <td>{{ p.description }}</td>
      <td>{{ p.price | currency:'PLN' }}</td>
      <td>{{ p.createdAt | date:'dd.MM.yyyy' }}</td>
    </tr>
  </tbody>
</table>
